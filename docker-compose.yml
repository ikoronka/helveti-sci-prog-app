services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend/house_rent.db:/app/house_rent.db
      - ~/.kaggle/kaggle.json:/root/.kaggle/kaggle.json:ro
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
